android.useAndroidX=true
kotlin.code.style=official
org.gradle.jvmargs=-Xmx2048m --enable-native-access=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED
org.gradle.parallel=true
# Override nonProxyHosts: remove *.google.com so dl.google.com goes through the egress proxy
# (JAVA_TOOL_OPTIONS incorrectly exempts *.google.com, causing direct-connect failures for Google Maven)
systemProp.http.nonProxyHosts=localhost|127.0.0.1|169.254.169.254|metadata.google.internal|*.svc.cluster.local|*.local
systemProp.https.nonProxyHosts=localhost|127.0.0.1|169.254.169.254|metadata.google.internal|*.svc.cluster.local|*.local
